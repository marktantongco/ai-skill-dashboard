name: Hourly Health Data Update

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  update-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run health check
        id: health
        run: bash check-all-skills.sh
        continue-on-error: true

      - name: Commit and push updated health data
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add skill-health.json
          git diff --quiet && echo "No changes to commit" || (git commit -m "Hourly health data update" && git push)

      - name: Create issue on failure
        if: failure() && steps.health.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const title = `Health Check Failed - ${date}`;
            const body = `## Health check workflow failed\n\n**Run ID**: ${context.runId}\n**Time**: ${new Date().toISOString()}\n\nCheck the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;
            
            // Check if issue already exists for today
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['health-check-failure']
            });
            
            const existing = issues.data.find(issue => issue.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'health-check-failure']
              });
            }